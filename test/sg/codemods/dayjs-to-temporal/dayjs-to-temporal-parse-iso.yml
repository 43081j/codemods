id: dayjs_to_temporal_parse_iso
valid:
  - dayjs("2000-01-01", "YYYY-MM-DD")
  - dayjs(someDate)
  - dayjs(new Date(2000))
  - 'dayjs({ year: 2000, month: 0, day: 1 })'
  - dayjs([2000, 0, 1])
  - dayjs(1280000000000)
  - dayjs()
invalid:
  - dayjs("2000-01-02T02:03:04Z")
  - dayjs("2000-01-02 02:03:04Z")
